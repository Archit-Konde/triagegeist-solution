<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Triagegeist</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%231e1e1e'/><text x='5' y='25' font-family='monospace' font-size='22' font-weight='bold' fill='%23C9A84C'>%3E</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #1e1e1e; --surface: #252526; --border: #3e3e42; --text: #d4d4d4; --muted: #858585; --accent: #C9A84C; --font: 'JetBrains Mono', monospace; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { text-align: center; padding: 2rem; }
    .code { font-size: clamp(4rem, 15vw, 8rem); font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 1rem; }
    .msg { font-size: 0.88rem; color: var(--muted); margin-bottom: 2rem; }
    .msg span { color: var(--accent); }
    a { display: inline-block; font-size: 0.82rem; color: var(--accent); border: 1px solid var(--border); padding: 0.5rem 1.2rem; border-radius: 2px; text-decoration: none; transition: border-color 0.2s; }
    a:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="code">404</p>
    <p class="msg"><span>error:</span> page not found &mdash; this route doesn't exist</p>
    <a href="https://archit-konde.github.io/triagegeist-solution/">&larr; back to project</a>
  </div>
</body>
</html>
