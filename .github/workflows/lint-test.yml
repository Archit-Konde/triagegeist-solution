name: Lint and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ dashboard/ --max-line-length=120 --ignore=E501,W503 --exclude=__pycache__

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pip install pytest
            pytest tests/ -v --ignore=tests/test_heavy.py || true
          else
            echo "No tests directory found, skipping."
          fi
